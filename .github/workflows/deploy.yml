name: Deploy portfolio to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Set GitHub Pages base path
        shell: bash
        env:
          PAGES_BASE_PATH_OVERRIDE: ${{ vars.PAGES_BASE_PATH }}
        run: |
          echo "DEPLOY_TARGET=github-pages" >> "$GITHUB_ENV"
          if [ -n "$PAGES_BASE_PATH_OVERRIDE" ]; then
            echo "PAGES_BASE_PATH=$PAGES_BASE_PATH_OVERRIDE" >> "$GITHUB_ENV"
          else
            echo "PAGES_BASE_PATH=/${GITHUB_REPOSITORY#*/}/" >> "$GITHUB_ENV"
          fi
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build site
        run: bun run build
      - name: Prepare GitHub Pages fallback
        shell: bash
        run: cp dist/client/index.html dist/client/404.html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/client

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
